name: CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          NAVER_MAP_STYLE_ID: ${{ secrets.NAVER_MAP_STYLE_ID }}
      - run: npm run lint

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            PREV_COMMIT=$(git rev-parse HEAD)
            git pull origin main

            # Update Nginx config
            sudo cp infra/nginx/api.skkuuniverse.com /etc/nginx/sites-available/
            sudo cp infra/nginx/api.skkuverse.com /etc/nginx/sites-available/
            sudo ln -sf /etc/nginx/sites-available/api.skkuverse.com /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx

            # Build new images
            docker compose build

            # --- Pre-deploy config validation ---
            # Dry-load lib/config.js inside the freshly-built image with the
            # VM's .env (inherited via env_file in docker-compose.yml). If
            # any required env var is missing, lib/config calls process.exit(1),
            # this command returns non-zero, and we abort the deploy BEFORE
            # touching running containers. Clean git revert — no crash loop,
            # no rolling update, no rollback function needed.
            echo "=== Pre-deploy config validation ==="
            if ! docker compose run --rm --no-deps -T api-1 \
                 node -e "require('./lib/config'); console.log('config ok')"; then
              echo "ERROR: production config validation failed — aborting deploy."
              echo "       See the FATAL error above for the missing env var(s)."
              git checkout "$PREV_COMMIT"
              exit 1
            fi

            rollback() {
              echo "Deployment failed — rolling back to $PREV_COMMIT"
              git checkout "$PREV_COMMIT"
              docker compose build
              docker compose up -d --no-deps api-1 api-2 poller
              sleep 15
              curl -sf http://localhost:3001/health/ready || echo "WARNING: rollback also failed"
            }

            # Rolling update: one replica at a time
            docker compose up -d --no-deps api-1
            HEALTHY=false
            for i in $(seq 1 6); do sleep 5; curl -sf http://localhost:3001/health/ready && HEALTHY=true && break; done
            if [ "$HEALTHY" = false ]; then rollback; exit 1; fi

            docker compose up -d --no-deps api-2
            HEALTHY=false
            for i in $(seq 1 6); do sleep 5; curl -sf http://localhost:3002/health/ready && HEALTHY=true && break; done
            if [ "$HEALTHY" = false ]; then rollback; exit 1; fi

            # Update poller last (no downtime impact)
            docker compose up -d --no-deps poller
            sleep 10
            docker compose ps poller --format '{{.State}}' | grep -q running || { rollback; exit 1; }
            docker compose logs poller --tail 5 | grep -q "MongoDB connected\|poller-only mode" || echo "WARNING: poller may not have initialized fully"
